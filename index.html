<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upscale Text Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #97499c;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 16px rgba(151, 73, 156, 0.2);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            height: 40px;
            width: auto;
            border-radius: 8px;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .new-message-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .new-message-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: rgba(151, 73, 156, 0.05);
            border-right: 1px solid rgba(151, 73, 156, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(151, 73, 156, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            color: #97499c;
        }

        .add-contact-btn {
            background: rgba(151, 73, 156, 0.1);
            color: #97499c;
            border: 1px solid rgba(151, 73, 156, 0.2);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .add-contact-btn:hover {
            background: rgba(151, 73, 156, 0.2);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(151, 73, 156, 0.1);
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #97499c;
            border-bottom: 2px solid #97499c;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .conversation-item, .contact-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(151, 73, 156, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .conversation-item:hover, .contact-item:hover {
            background: rgba(151, 73, 156, 0.08);
        }

        .conversation-item.active {
            background: rgba(151, 73, 156, 0.12);
        }

        .conversation-name, .contact-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .conversation-preview, .contact-phone {
            font-size: 13px;
            color: #666;
        }

        .conversation-time {
            font-size: 12px;
            color: #999;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-btn {
            background: #97499c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .message-btn:hover {
            background: #7a3d7e;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(151, 73, 156, 0.02);
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 16px;
        }

        .active-chat {
            display: none;
            flex: 1;
            flex-direction: column;
        }

        .active-chat.active {
            display: flex;
        }

        .chat-header {
            padding: 20px 30px;
            background: rgba(151, 73, 156, 0.05);
            border-bottom: 1px solid rgba(151, 73, 156, 0.1);
        }

        .chat-contact {
            font-weight: 600;
            color: #333;
            font-size: 18px;
        }

        .chat-phone {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.sent .message-bubble {
            background: #97499c;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .message-input-area {
            padding: 20px 30px;
            background: rgba(151, 73, 156, 0.05);
            border-top: 1px solid rgba(151, 73, 156, 0.1);
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(151, 73, 156, 0.2);
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: #97499c;
        }

        .send-btn {
            background: #97499c;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            background: #7a3d7e;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 8px 32px rgba(151, 73, 156, 0.2);
            border: 1px solid rgba(151, 73, 156, 0.1);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(151, 73, 156, 0.2);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #97499c;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #97499c;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #7a3d7e;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <img src="logo.png" alt="Upscale VoIP" class="logo">
                <h1>Text Messenger</h1>
            </div>
            <button class="new-message-btn" onclick="openNewMessage()">+ New Message</button>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">Messages</div>
                    <button class="add-contact-btn" onclick="openAddContact()">+ Add Contact</button>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('conversations')">Conversations</button>
                    <button class="tab" onclick="switchTab('contacts')">Contacts</button>
                </div>

                <div class="tab-content active" id="conversations-tab">
                    <div id="conversationList">
                        <div class="loading">Loading conversations...</div>
                    </div>
                </div>

                <div class="tab-content" id="contacts-tab">
                    <div id="contactsList">
                        <div class="loading">Loading contacts...</div>
                    </div>
                </div>
            </div>

            <div class="chat-area">
                <div class="empty-state" id="emptyState">
                    Select a conversation to start messaging
                </div>
                <div class="active-chat" id="activeChat">
                    <div class="chat-header">
                        <div class="chat-contact" id="chatContact"></div>
                        <div class="chat-phone" id="chatPhone"></div>
                    </div>
                    <div class="messages-container" id="messagesContainer"></div>
                    <div class="message-input-area">
                        <textarea class="message-input" id="messageInput" placeholder="Type your message..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Message Modal -->
    <div class="modal" id="newMessageModal">
        <div class="modal-content">
            <div class="modal-title">New Message</div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-input" id="newMessagePhone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label class="form-label">Contact Name (Optional)</label>
                <input type="text" class="form-input" id="newMessageName" placeholder="Enter contact name">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeNewMessage()">Cancel</button>
                <button class="btn btn-primary" onclick="createNewMessage()">Send Message</button>
            </div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal" id="addContactModal">
        <div class="modal-content">
            <div class="modal-title">Add New Contact</div>
            <div class="form-group">
                <label class="form-label">Contact Name</label>
                <input type="text" class="form-input" id="addContactName" placeholder="Enter contact name">
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-input" id="addContactPhone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label class="form-label">Email (Optional)</label>
                <input type="email" class="form-input" id="addContactEmail" placeholder="Enter email address">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeAddContact()">Cancel</button>
                <button class="btn btn-primary" onclick="addNewContact()">Add Contact</button>
            </div>
        </div>
    </div>

    <script>
        // RingLogix API Configuration
        const config = {
            url: 'https://api.ringlogix.com/pbx/v1',
            token: '097329c4bf8fa11b85a7a8a637f262dd',
            domain: '280253',
            user: 'jrivera@upscevoip.com',
            phone: '8454442343'
        };

        let conversations = [];
        let contacts = [];
        let activeConversation = null;

        // Initialize
        window.onload = function() {
            loadConversations();
            loadContacts();
            setupEventListeners();
        };

        function setupEventListeners() {
            // Message input events
            const messageInput = document.getElementById('messageInput');
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Modal backdrop clicks
            document.getElementById('newMessageModal').addEventListener('click', function(e) {
                if (e.target === this) closeNewMessage();
            });

            document.getElementById('addContactModal').addEventListener('click', function(e) {
                if (e.target === this) closeAddContact();
            });
        }

        // Tab Management
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'conversations') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('conversations-tab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('contacts-tab').classList.add('active');
            }
        }

        // Load Conversations from RingLogix API
        async function loadConversations() {
            try {
                const params = new URLSearchParams({
                    object: 'message',
                    action: 'read',
                    limit: '100',
                    order: 'time_start DESC',
                    domain: config.domain,
                    user: config.user
                });

                const response = await fetch(config.url + '?' + params, {
                    headers: {
                        'Authorization': 'Bearer ' + config.token
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const messages = Array.isArray(data) ? data : (data.message || data.messages || data.data || []);
                    buildConversations(messages);
                } else {
                    renderConversations();
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
                renderConversations();
            }
        }

        function buildConversations(messages) {
            const convMap = {};
            
            messages.forEach(msg => {
                const key = msg.destination || msg.from_num || 'unknown';
                if (!convMap[key]) {
                    convMap[key] = {
                        id: key,
                        phone: key,
                        name: key,
                        lastMessage: msg.message || msg.body || '[Media]',
                        lastTime: msg.time_start,
                        messages: []
                    };
                }
                convMap[key].messages.push(msg);
            });

            conversations = Object.values(convMap);
            renderConversations();
        }

        function renderConversations() {
            const container = document.getElementById('conversationList');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div class="loading">No conversations yet</div>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${activeConversation && activeConversation.id === conv.id ? 'active' : ''}" 
                     onclick="selectConversation('${conv.id}')">
                    <div class="conversation-name">${conv.name}</div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="conversation-preview">${conv.lastMessage}</div>
                        <div class="conversation-time">${formatTime(conv.lastTime)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Load Contacts from RingLogix API
        async function loadContacts() {
            try {
                const params = new URLSearchParams({
                    object: 'contact',
                    action: 'read',
                    limit: '100',
                    domain: config.domain,
                    user: config.user
                });

                const response = await fetch(config.url + '?' + params, {
                    headers: {
                        'Authorization': 'Bearer ' + config.token
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    contacts = Array.isArray(data) ? data : (data.contact || data.contacts || data.data || []);
                    renderContacts();
                } else {
                    renderContacts();
                }
            } catch (error) {
                console.error('Error loading contacts:', error);
                renderContacts();
            }
        }

        function renderContacts() {
            const container = document.getElementById('contactsList');
            
            if (contacts.length === 0) {
                container.innerHTML = '<div class="loading">No contacts found</div>';
                return;
            }

            container.innerHTML = contacts.map(contact => `
                <div class="contact-item">
                    <div>
                        <div class="contact-name">${contact.name || 'Unknown'}</div>
                        <div class="contact-phone">${contact.phone || contact.number || contact.destination || ''}</div>
                    </div>
                    <button class="message-btn" onclick="messageContact('${contact.phone || contact.number || contact.destination || ''}', '${contact.name || ''}')">Message</button>
                </div>
            `).join('');
        }

        // Conversation Management
        function selectConversation(id) {
            activeConversation = conversations.find(c => c.id === id);
            if (activeConversation) {
                renderConversations();
                showChat();
                loadMessages();
            }
        }

        function showChat() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('activeChat').classList.add('active');
            document.getElementById('chatContact').textContent = activeConversation.name;
            document.getElementById('chatPhone').textContent = activeConversation.phone;
        }

        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (!activeConversation || !activeConversation.messages || activeConversation.messages.length === 0) {
                container.innerHTML = '<div class="loading">No messages yet</div>';
                return;
            }

            container.innerHTML = activeConversation.messages.map(msg => {
                const isSent = msg.direction === 'out' || msg.from_num === config.phone;
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">${msg.message || msg.body || '[Media]'}</div>
                        <div class="message-time">${formatTime(msg.time_start)}</div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        // Send Message via RingLogix API
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !activeConversation) {
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('object', 'message');
                formData.append('action', 'create');
                formData.append('from_num', config.phone);
                formData.append('destination', activeConversation.phone);
                formData.append('message', message);
                formData.append('type', 'sms');
                formData.append('domain', config.domain);
                formData.append('user', config.user);

                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + config.token
                    },
                    body: formData
                });

                if (response.ok) {
                    const newMessage = {
                        message: message,
                        direction: 'out',
                        time_start: Math.floor(Date.now() / 1000)
                    };
                    
                    activeConversation.messages.push(newMessage);
                    activeConversation.lastMessage = message;
                    activeConversation.lastTime = newMessage.time_start;
                    
                    input.value = '';
                    loadMessages();
                    renderConversations();
                } else {
                    alert('Failed to send message');
                }
            } catch (error) {
                console.error('Error sending message:', error);
                alert('Network error sending message');
            }

            sendBtn.disabled = false;
        }

        // New Message Modal
        function openNewMessage() {
            document.getElementById('newMessageModal').classList.add('active');
        }

        function closeNewMessage() {
            document.getElementById('newMessageModal').classList.remove('active');
            document.getElementById('newMessagePhone').value = '';
            document.getElementById('newMessageName').value = '';
        }

        function createNewMessage() {
            const phone = document.getElementById('newMessagePhone').value.trim();
            const name = document.getElementById('newMessageName').value.trim() || phone;

            if (!phone) {
                alert('Please enter a phone number');
                return;
            }

            let existing = conversations.find(c => c.phone === phone);
            if (existing) {
                selectConversation(existing.id);
                closeNewMessage();
                return;
            }

            const newConversation = {
                id: Date.now().toString(),
                name: name,
                phone: phone,
                lastMessage: 'Start a conversation...',
                lastTime: Math.floor(Date.now() / 1000),
                messages: []
            };

            conversations.unshift(newConversation);
            renderConversations();
            selectConversation(newConversation.id);
            closeNewMessage();
        }

        // Add Contact Modal
        function openAddContact() {
            document.getElementById('addContactModal').classList.add('active');
        }

        function closeAddContact() {
            document.getElementById('addContactModal').classList.remove('active');
            document.getElementById('addContactName').value = '';
            document.getElementById('addContactPhone').value = '';
            document.getElementById('addContactEmail').value = '';
        }

        function addNewContact() {
            const name = document.getElementById('addContactName').value.trim();
            const phone = document.getElementById('addContactPhone').value.trim();
            const email = document.getElementById('addContactEmail').value.trim();

            if (!name) {
                alert('Please enter a contact name');
                return;
            }

            if (!phone) {
                alert('Please enter a phone number');
                return;
            }

            let existing = contacts.find(c => c.phone === phone);
            if (existing) {
                alert('Contact with this phone number already exists!');
                return;
            }

            const newContact = {
                id: Date.now().toString(),
                name: name,
                phone: phone,
                email: email
            };

            contacts.unshift(newContact);
            renderContacts();
            closeAddContact();
            switchTab('contacts');
        }

        function messageContact(phone, name) {
            switchTab('conversations');

            let existing = conversations.find(c => c.phone === phone);
            if (existing) {
                selectConversation(existing.id);
            } else {
                const newConv = {
                    id: phone,
                    phone: phone,
                    name: name,
                    lastMessage: 'Start a conversation...',
                    lastTime: Math.floor(Date.now() / 1000),
                    messages: []
                };
                conversations.unshift(newConv);
                renderConversations();
                selectConversation(phone);
            }
        }

        // Utilities
        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp * 1000);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (days === 0) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (days === 1) {
                return 'Yesterday';
            } else if (days < 7) {
                return date.toLocaleDateString([], { weekday: 'short' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }
    </script>
</body>
</html>
